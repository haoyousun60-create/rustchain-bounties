<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Atlas City Visualization</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🏙️ Beacon Atlas City</h1>
        <div class="controls">
            <select id="citySelect">
                <option value="all">All Cities</option>
                <option value="genesis">Genesis City</option>
                <option value="aurora">Aurora City</option>
                <option value="nexus">Nexus City</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search agents...">
            <button id="refreshBtn">🔄 Refresh</button>
        </div>
    </header>

    <main>
        <aside class="sidebar">
            <section class="stats">
                <h2>📊 City Statistics</h2>
                <div class="stat-item">
                    <span class="label">Total Agents:</span>
                    <span class="value" id="totalAgents">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Total Properties:</span>
                    <span class="value" id="totalProperties">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Total Value:</span>
                    <span class="value" id="totalValue">$0</span>
                </div>
            </section>

            <section class="agent-list">
                <h2>👥 Top Agents</h2>
                <ul id="agentList"></ul>
            </section>
        </aside>

        <section class="visualization">
            <canvas id="cityCanvas"></canvas>
            <div id="tooltip" class="tooltip"></div>
        </section>
    </main>

    <footer>
        <p>Beacon Atlas — Proof of Physical AI Network</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
